  }

  .measure-item {

    cursor: pointer;

    transition: background 0.1s;

  .measure-item:hover {
    background: #eef7fa;

  }

<body>

<header>
  <h1>Measure Selection</h1>
  <div id="reach-display"></div>
  <div id="problem-display"></div>
</header>

<div class="impoundment-prompt hidden" id="impoundment-prompt">
  <div class="impoundment-question">Is this reach impounded?</div>
  <div class="impoundment-options">
    <label class="impoundment-option">
      <input type="radio" name="impoundment-choice" value="yes">
      Yes, impounded
    </label>
    <label class="impoundment-option">
      <input type="radio" name="impoundment-choice" value="no">
      No, not impounded
    </label>
    <button class="impoundment-button" type="button" onclick="applyImpoundmentChoice()">
      Continue
    </button>
  </div>
  <div class="impoundment-note">If the reach is not impounded, impoundment-only measures will be hidden from the suggested list.</div>
</div>

<div class="layout">

  <div class="panel-left">
    <div class="panel-header">Suggested measures</div>
    <div class="list-scroll" id="measure-list">
      <div class="empty-state">Loading suggested measures...</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-header">
      <span>Selected</span>
      <span class="selected-count" id="selected-count">0</span>
    </div>

    <div class="list-scroll" id="selected-list">
      <div class="empty-state">No measures selected yet.</div>
    </div>

    <div class="footer">
      <button class="confirm-button" id="confirm-button" onclick="confirmSelection()">
        Confirm selection
      </button>
      <div class="status-message" id="status-message"></div>
    </div>
  </div>

</div>

      problem fields.
   2. SELECTED_MEASURES_TABLE_URL should point to the hosted table where
      the refined measure selections are stored.
   3. FIELD_PROBLEM_REACH_ID must exist in the reach-problem layer.
   4. FIELD_SELECTED_REACH_ID must exist in the selected-measures table.
   5. Problem fields in the reach-problem layer should use the same names

   6. Problem values used for suggestions are 1 and 2.
------------------------------------------------------------------ */

  FIELD_PROBLEM_REACH_ID: "D4A_ID",

  FIELD_SELECTED_REACH_ID: "reach_id",

  // Field used to find the selected reach in the measure-status layer

  FIELD_MEASURE_STATUS_REACH_ID: "D4A_ID",

/* ------------------------------------------------------------------
   STATE
------------------------------------------------------------------ */

var selected = {};
var suggestedMeasureIds = [];
var measureStatusLayerInfoCache = null;
var activeProblemIds = [];
var activeProblemDetails = [];
var currentReachIsImpounded = null;
var loadedReachAttributes = null;

/* ------------------------------------------------------------------
   INITIALISE
------------------------------------------------------------------ */

initialise();

async function initialise() {
  showCurrentReach();

  var reachId = getReachIdFromUrl();

  if (!reachId) {
    setStatus("No reach_id was found in the URL. Open this page with ?reach_id=YOUR_REACH_ID.", "error");
    setEmptyMeasureList("No reach selected.");
    return;
  }

  if (!isUrlConfigured(CONFIG.REACH_PROBLEM_LAYER_URL)) {
    setStatus("REACH_PROBLEM_LAYER_URL has not been configured in the script.", "error");
    setEmptyMeasureList("Reach problem layer is not configured.");
    return;
  }

  if (!isUrlConfigured(CONFIG.SELECTED_MEASURES_TABLE_URL)) {
    setStatus("SELECTED_MEASURES_TABLE_URL has not been configured in the script.", "error");
    setEmptyMeasureList("Selected measures table is not configured.");
    return;
  }

  try {
    setStatus("Loading problems for reach " + reachId + "...", "");

    loadedReachAttributes = await queryReachProblemAttributes(reachId);
    currentReachIsImpounded = getReachImpoundmentStatus(loadedReachAttributes);
    activeProblemIds = getActiveProblemIdsFromAttributes(loadedReachAttributes);
    activeProblemDetails = getProblemDetails(activeProblemIds);
    suggestedMeasureIds = [];

    updateProblemDisplay();
    selected = {};
    updateSelectedList();

    if (activeProblemIds.length === 0) {
      hideImpoundmentPrompt();
      setEmptyMeasureList("No suggested measures for this reach.");
      setStatus("No active problem fields with value 1 or 2 were found for reach " + reachId + ".", "");
      return;
    }

    showImpoundmentPrompt(currentReachIsImpounded);
    setEmptyMeasureList("Answer the impoundment question above to build the suggested measure list.");
    setStatus("Problems loaded for reach " + reachId + ". Please confirm whether the reach is impounded.", "");

  } catch (error) {
    console.error(error);
    setStatus("Could not initialise measure selection: " + error.message, "error");
    setEmptyMeasureList("Could not load suggested measures.");
  }
}

async function processMeasureSuggestionsAfterImpoundmentChoice() {
  var reachId = getReachIdFromUrl();

  try {
    suggestedMeasureIds = filterMeasureIdsByImpoundmentRule(
      getSuggestedMeasureIds(activeProblemIds),
      currentReachIsImpounded
    );

    updateProblemDisplay();
    buildMeasureList(suggestedMeasureIds);

    if (suggestedMeasureIds.length === 0) {
      selected = {};
      updateSelectedList();
      setStatus("No suggested measures remain for reach " + reachId + getImpoundmentStatusTextForStatus() + ".", "");
      return;
    }

    // Default behaviour: display suggested measures but do not tick them.
    // Previously saved selections, if present, are still loaded and ticked.
    selected = {};

    if (CONFIG.USE_EXISTING_SELECTION_IF_AVAILABLE) {
      var existingMeasureIds = await queryMeasureIdsForReach(reachId);

      if (existingMeasureIds.length > 0) {
        applyExistingSelection(existingMeasureIds);
        setStatus(
          "Loaded " + existingMeasureIds.length + " previously saved measure(s) for reach " + reachId + ". Suggested measures are based on " + activeProblemIds.length + " active problem field(s)" + getImpoundmentStatusTextForStatus() + ".",
          "success"
        );
      } else {
        setStatus(
          "Displayed " + suggestedMeasureIds.length + " suggested measure(s) from " + activeProblemIds.length + " active problem field(s)" + getImpoundmentStatusTextForStatus() + ". Select the measures you want to keep.",
          "success"
        );
      }
    } else {
      setStatus(
        "Displayed " + suggestedMeasureIds.length + " suggested measure(s) from " + activeProblemIds.length + " active problem field(s)" + getImpoundmentStatusTextForStatus() + ". Select the measures you want to keep.",
        "success"
      );
    }

    refreshCheckedStates();
    updateSelectedList();

  } catch (error) {
    console.error(error);
    setStatus("Could not build suggested measures: " + error.message, "error");
    setEmptyMeasureList("Could not build suggested measures.");
  }
}

function showImpoundmentPrompt(preselectedValue) {
  var prompt = document.getElementById("impoundment-prompt");
  if (!prompt) { return; }

  prompt.classList.remove("hidden");

  var radios = document.querySelectorAll("input[name='impoundment-choice']");
  radios.forEach(function(radio) {
    radio.checked = false;
  });

  if (preselectedValue === true) {
    var yes = document.querySelector("input[name='impoundment-choice'][value='yes']");
    if (yes) { yes.checked = true; }
  } else if (preselectedValue === false) {
    var no = document.querySelector("input[name='impoundment-choice'][value='no']");
    if (no) { no.checked = true; }
  }
}

function hideImpoundmentPrompt() {
  var prompt = document.getElementById("impoundment-prompt");
  if (prompt) { prompt.classList.add("hidden"); }
}

function applyImpoundmentChoice() {
  var checked = document.querySelector("input[name='impoundment-choice']:checked");

  if (!checked) {
    setStatus("Please answer whether this reach is impounded before continuing.", "error");
    return;
  }

  currentReachIsImpounded = checked.value === "yes";
  hideImpoundmentPrompt();
  setStatus("Building suggested measures" + getImpoundmentStatusTextForStatus() + "...", "");
  processMeasureSuggestionsAfterImpoundmentChoice();
}

/* ------------------------------------------------------------------
   BUILD MEASURE LIST
------------------------------------------------------------------ */

function buildMeasureList(measureIdsToDisplay) {
  var measureIdSet = {};

  measureIdsToDisplay.forEach(function(id) {
    measureIdSet[id] = true;
  });

  var measuresToDisplay = MEASURES.filter(function(m) {
    return measureIdSet[m.id] === true;
  });

  if (measuresToDisplay.length === 0) {
    setEmptyMeasureList("No suggested measures for this reach.");
    return;
  }

  var groups = {};
  var groupOrder = [];

  measuresToDisplay.forEach(function(m) {
    if (!groups[m.group]) {
      groups[m.group] = [];
      groupOrder.push(m.group);
    }
    groups[m.group].push(m);
  });

  var container = document.getElementById("measure-list");
  container.innerHTML = "";

  groupOrder.forEach(function(gname) {
    var gh = document.createElement("div");
    gh.className = "group-header";
    gh.innerHTML = '<span class="group-label">' + escapeHtml(gname) + '</span>';
    container.appendChild(gh);

    groups[gname].forEach(function(m) {
      var el = document.createElement("div");
      el.className = "measure-item";
      el.setAttribute("data-measure-id", m.id);

      el.innerHTML =
        '<input type="checkbox">' +
        '<span class="measure-id">' + escapeHtml(m.id) + '</span>' +
        '<span class="measure-name">' + escapeHtml(m.name) + '</span>';

      el.addEventListener("click", function() {
        toggleMeasure(m.id);
      });

      container.appendChild(el);
    });
  });
}

function setEmptyMeasureList(message) {
  var container = document.getElementById("measure-list");
  container.innerHTML = '<div class="empty-state">' + escapeHtml(message) + '</div>';
}

/* ------------------------------------------------------------------
   PROBLEM-TO-MEASURE LOGIC
------------------------------------------------------------------ */

function getActiveProblemIdsFromAttributes(attributes) {
  var active = [];

  PROBLEMS.forEach(function(problem) {
    var value = getAttributeCaseInsensitive(attributes, problem.id);

    if (isActiveProblemValue(value)) {
      active.push(problem.id);
    }
  });

  return active;
}

function isActiveProblemValue(value) {
  if (value === null || value === undefined) {
    return false;
  }

  var numericValue = Number(value);

  return CONFIG.ACTIVE_PROBLEM_VALUES.indexOf(numericValue) !== -1;
}

function getSuggestedMeasureIds(problemIds) {
  var suggested = {};

  problemIds.forEach(function(problemId) {
    var ids = PROBLEM_MEASURE_LOOKUP[normaliseProblemId(problemId)] || [];

    ids.forEach(function(measureId) {
      suggested[measureId] = true;
    });
  });

  return Object.keys(suggested).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });
}

function getProblemDetails(problemIds) {
  var problemIdSet = {};

  problemIds.forEach(function(id) {
    problemIdSet[normaliseProblemId(id)] = true;
  });

  return PROBLEMS.filter(function(p) {
    return problemIdSet[p.id] === true;
  });
}

function updateProblemDisplay() {
  var el = document.getElementById("problem-display");

  if (!el) { return; }

  var impoundmentText = getImpoundmentDisplayText();

  if (activeProblemIds.length === 0) {
    el.textContent = "Active problems: 0" + impoundmentText;
  } else {
    el.textContent = "Active problems: " + activeProblemIds.length + " | Suggested measures: " + suggestedMeasureIds.length + impoundmentText;
  }
}

/* ------------------------------------------------------------------
   SELECTION LOGIC
------------------------------------------------------------------ */

function setSuggestedMeasuresAsSelected() {
  selected = {};

  suggestedMeasureIds.forEach(function(id) {
    var measure = getMeasureById(id);

    if (measure) {
      selected[id] = measure;
    }
  });
}

function applyExistingSelection(existingMeasureIds) {
  var suggestedSet = {};
  suggestedMeasureIds.forEach(function(id) { suggestedSet[id] = true; });

  selected = {};

  existingMeasureIds.forEach(function(id) {
    if (suggestedSet[id] === true) {
      var measure = getMeasureById(id);

      if (measure) {
        selected[id] = measure;
      }
    }
  });
}

function toggleMeasure(measureId) {
  var measure = getMeasureById(measureId);

  if (!measure) { return; }

  if (selected[measureId]) {
    delete selected[measureId];
  } else {
    selected[measureId] = measure;
  }

  refreshCheckedStates();
  updateSelectedList();
}

function refreshCheckedStates() {
  var items = document.querySelectorAll(".measure-item");

  items.forEach(function(item) {
    var measureId = item.getAttribute("data-measure-id");
    var checkbox = item.querySelector("input[type='checkbox']");

    if (selected[measureId]) {
      item.classList.add("checked");
      checkbox.checked = true;
    } else {
      item.classList.remove("checked");
      checkbox.checked = false;
    }
  });
}

function updateSelectedList() {
  var keys = Object.keys(selected).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });

  var list = document.getElementById("selected-list");
  document.getElementById("selected-count").textContent = keys.length;

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state">No measures selected yet.</div>';
    return;
  }

  list.innerHTML = "";

  keys.forEach(function(id) {
    var m = selected[id];
    var el = document.createElement("div");
    el.className = "selected-item";

    el.innerHTML =
      '<span class="sid">' + escapeHtml(m.id) + '</span>' +
      '<span class="sname">' + escapeHtml(m.name) + '</span>';

    list.appendChild(el);
  });
}

/* ------------------------------------------------------------------
   CURRENT REACH
------------------------------------------------------------------ */

function getReachIdFromUrl() {
  var params = new URLSearchParams(window.location.search);

  return (
    params.get("reach_id") ||
    params.get("Reach_ID") ||
    params.get("REACH_ID") ||
    params.get("segment_id") ||
    params.get("id")
  );
}

function showCurrentReach() {
  var reachId = getReachIdFromUrl();
  var el = document.getElementById("reach-display");

  if (!el) { return; }

  if (reachId) {
    el.textContent = "Current reach: " + reachId;
  } else {
    el.textContent = "No reach selected";
  }
}

/* ------------------------------------------------------------------
   QUERY REACH PROBLEM FEATURE
------------------------------------------------------------------ */

async function queryReachProblemAttributes(reachId) {
  var url = CONFIG.REACH_PROBLEM_LAYER_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_PROBLEM_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("outFields", "*");
  formData.append("returnGeometry", "false");
  formData.append("resultRecordCount", "1");

  if (CONFIG.REACH_PROBLEM_TOKEN) {
    formData.append("token", CONFIG.REACH_PROBLEM_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying reach problem layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from reach problem layer.");
  }

  if (!result.features || result.features.length === 0) {
    throw new Error("No row found in the reach problem layer for " + CONFIG.FIELD_PROBLEM_REACH_ID + " = " + reachId + ".");
  }

  return result.features[0].attributes || {};
}

/* ------------------------------------------------------------------
   LOAD EXISTING SELECTIONS FOR CURRENT REACH
------------------------------------------------------------------ */

async function queryMeasureIdsForReach(reachId) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_SELECTED_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("outFields", CONFIG.FIELD_MEASURE_ID);
  formData.append("returnGeometry", "false");

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while loading existing selection: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from selected measures table.");
  }

  if (!result.features) { return []; }

  return result.features
    .map(function(feature) {
      return feature.attributes[CONFIG.FIELD_MEASURE_ID];
    })
    .filter(function(id) {
      return id !== null && id !== undefined && String(id).length > 0;
    });
}

/* ------------------------------------------------------------------
   CONFIRM SELECTION
------------------------------------------------------------------ */

async function confirmSelection() {
  clearStatus();

  var reachId = getReachIdFromUrl();
  var keys = Object.keys(selected).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });

  if (!reachId) {
    setStatus("No reach_id was found in the URL. Open this page with ?reach_id=YOUR_REACH_ID.", "error");
    return;
  }

  if (suggestedMeasureIds.length === 0) {
    setStatus("No suggested measures are available for this reach because no active problem fields with value 1 or 2 were found.", "error");
    return;
  }

  if (keys.length === 0) {
    setStatus("No measures selected for reach " + reachId + ".", "error");
    return;
  }

  var confirmButton = document.getElementById("confirm-button");
  confirmButton.disabled = true;
  confirmButton.textContent = "Saving...";

  try {
    if (CONFIG.UPDATE_ONLY_CURRENT_REACH) {
      await deleteExistingRowsForReach(reachId);
    }

    var features = keys.map(function(id) {
      var m = selected[id];
      var attributes = {};
      var now = Date.now();
      var rule = getAssignmentRuleForMeasure(m.id);
      var assignmentInfo = getInitialAssignmentInfoForMeasure(m.id, rule, reachId, now);

      attributes[CONFIG.FIELD_SELECTED_REACH_ID] = reachId;
      attributes[CONFIG.FIELD_MEASURE_ID] = m.id;
      attributes[CONFIG.FIELD_MEASURE_NAME] = m.name;
      attributes[CONFIG.FIELD_MEASURE_GROUP] = m.group;
      attributes[CONFIG.FIELD_SELECTED_AT] = now;
      attributes[CONFIG.FIELD_SELECTION_STATUS] = "selected";

      attributes[CONFIG.FIELD_ASSIGNMENT_GROUP] = assignmentInfo.assignment_group;
      attributes[CONFIG.FIELD_ASSIGNMENT_TARGET] = assignmentInfo.assignment_target;
      attributes[CONFIG.FIELD_GEOMETRY_TYPE] = assignmentInfo.geometry_type;
      attributes[CONFIG.FIELD_ASSIGNMENT_MODE] = assignmentInfo.assignment_mode;
      attributes[CONFIG.FIELD_ASSIGNMENT_STATUS] = assignmentInfo.assignment_status;
      attributes[CONFIG.FIELD_ASSIGNED_FEATURE_ID] = assignmentInfo.assigned_feature_id;
      attributes[CONFIG.FIELD_ASSIGNED_LAYER] = assignmentInfo.assigned_layer;
      attributes[CONFIG.FIELD_ASSIGNED_AT] = assignmentInfo.assigned_at;
      attributes[CONFIG.FIELD_EXCLUSION_REASON] = null;

      return { attributes: attributes };
    });

    var addResult = await addSelectedRows(features);

    if (!allAddsSuccessful(addResult)) {
      console.error(addResult);
      setStatus("The request was sent, but one or more rows were not saved. Check the browser console.", "error");
      return;
    }

    var pendingText = getPendingAssignmentSummaryText(keys);

    if (isUrlConfigured(CONFIG.MEASURE_STATUS_LAYER_URL)) {
      await updateMeasureStatusLayerForReach(reachId, keys);
      setStatus("Selection saved for reach " + reachId + " and automatic reach-level measure-status fields were updated." + pendingText, "success");
    } else {
      setStatus("Selection saved for reach " + reachId + ". Measure-status layer URL is not configured, so D4A fields were not updated." + pendingText, "success");
    }

  } catch (error) {
    console.error(error);
    setStatus("Saving failed: " + error.message, "error");

  } finally {
    confirmButton.disabled = false;
    confirmButton.textContent = "Confirm selection";
  }
}

/* ------------------------------------------------------------------
   ARCGIS REST FUNCTIONS FOR SELECTED MEASURES TABLE
------------------------------------------------------------------ */

async function addSelectedRows(features) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/addFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify(features));

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while adding rows: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS addFeatures error.");
  }

  return result;
}

async function deleteExistingRowsForReach(reachId) {
  var objectIds = await queryObjectIdsForReach(reachId);

  if (objectIds.length === 0) { return; }

  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/deleteFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("objectIds", objectIds.join(","));

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while deleting existing rows: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS deleteFeatures error.");
  }

  return result;
}

async function queryObjectIdsForReach(reachId) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_SELECTED_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("returnIdsOnly", "true");

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying existing rows: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error.");
  }

  return result.objectIds || [];
}

/* ------------------------------------------------------------------
   ARCGIS REST FUNCTIONS FOR MEASURE-STATUS FEATURE LAYER
------------------------------------------------------------------ */

async function updateMeasureStatusLayerForReach(reachId, selectedMeasureIds) {
  var measureIdsForReachStatus = selectedMeasureIds;

  if (CONFIG.UPDATE_MEASURE_STATUS_WITH_AUTO_REACH_MEASURES_ONLY) {
    measureIdsForReachStatus = selectedMeasureIds.filter(function(id) {
      return shouldUpdateReachStatusForMeasure(id);
    });
  }

  var objectIds = await queryMeasureStatusObjectIdsForReach(reachId);

  if (objectIds.length === 0) {
    throw new Error("No matching row found in measure-status layer for reach " + reachId + ".");
  }

  if (objectIds.length > 1) {
    throw new Error("More than one matching row found in measure-status layer for reach " + reachId + ". The layer should contain only one row per reach.");
  }

  var layerInfo = await getMeasureStatusLayerInfo();
  var existingD4AFields = getExistingMeasureStatusD4AFieldsFromInfo(layerInfo);
  var objectIdFieldName = layerInfo.objectIdField || CONFIG.FIELD_MEASURE_STATUS_OBJECTID;

  if (existingD4AFields.length === 0) {
    throw new Error("The measure-status layer does not contain any D4A measure fields to update. Expected names like D4A_01, D4A_02, ... D4A_93.");
  }

  var selectedSet = {};
  measureIdsForReachStatus.forEach(function(id) {
    selectedSet[normalizeMeasureId(id)] = true;
  });

  var attributes = {};
  attributes[objectIdFieldName] = objectIds[0];

  existingD4AFields.forEach(function(fieldName) {
    var normalizedFieldName = normalizeMeasureId(fieldName);

    if (CONFIG.RESET_UNSELECTED_MEASURE_FIELDS_TO_ZERO) {
      attributes[fieldName] = selectedSet[normalizedFieldName] ? 1 : 0;
    } else if (selectedSet[normalizedFieldName]) {
      attributes[fieldName] = 1;
    }
  });

  var fieldUpdateCount = Object.keys(attributes).length - 1;

  if (fieldUpdateCount === 0) {
    throw new Error("No matching D4A measure fields were available to update in the measure-status layer.");
  }

  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "") + "/updateFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify([{ attributes: attributes }]));

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while updating measure-status layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS updateFeatures error for measure-status layer.");
  }

  if (!allUpdatesSuccessful(result)) {
    console.error("Measure-status updateFeatures result:", result);
    throw new Error(buildUpdateFeaturesErrorMessage(result));
  }

  return result;
}

async function getMeasureStatusLayerInfo() {
  if (measureStatusLayerInfoCache) {
    return measureStatusLayerInfoCache;
  }

  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "");

  var formData = new FormData();
  formData.append("f", "json");

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while reading measure-status layer metadata: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS metadata error from measure-status layer.");
  }

  if (!result.fields) {
    throw new Error("Could not read fields from the measure-status layer.");
  }

  measureStatusLayerInfoCache = result;
  return result;
}

function getExistingMeasureStatusD4AFieldsFromInfo(layerInfo) {
  return layerInfo.fields
    .map(function(field) { return field.name; })
    .filter(function(fieldName) {
      // Accept both field-name formats:
      //   D4A_01  ... D4A_93   current ArcGIS field names
      //   D4A_001 ... D4A_093  internal measure IDs / fallback
      return /^D4A_\d{1,3}$/i.test(fieldName);
    });
}

async function queryMeasureStatusObjectIdsForReach(reachId) {
  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_MEASURE_STATUS_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("returnIdsOnly", "true");

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying measure-status layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from measure-status layer.");
  }

  return result.objectIds || [];
}

/* ------------------------------------------------------------------
   HELPERS
------------------------------------------------------------------ */

function getMeasureById(id) {
  return MEASURES.find(function(m) {
    return m.id === id;
  });
}

function getMeasureNumber(id) {
  var m = getMeasureById(id);
  return m && m.measure_no ? m.measure_no : 999999;
}

function normaliseProblemId(value) {
  return String(value).trim().toLowerCase();
}

function getAttributeCaseInsensitive(attributes, fieldName) {
  var target = normaliseProblemId(fieldName);
  var keys = Object.keys(attributes);

  for (var i = 0; i < keys.length; i++) {
    if (normaliseProblemId(keys[i]) === target) {
      return attributes[keys[i]];
    }
  }

  return undefined;
}

function isUrlConfigured(url) {
  return (
    url &&
    url.indexOf("PASTE_") === -1 &&
    url.indexOf("YOUR_") === -1
  );
}

function allAddsSuccessful(result) {
  if (!result || !result.addResults) { return false; }

  return result.addResults.every(function(r) {
    return r.success === true;
  });
}

function allUpdatesSuccessful(result) {
  if (!result || !result.updateResults) { return false; }

  return result.updateResults.every(function(r) {
    return r.success === true;
  });
}

function buildUpdateFeaturesErrorMessage(result) {
  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return "ArcGIS updateFeatures returned no updateResults for the measure-status layer.";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r) {
      if (!r.error) {
        return "Unsuccessful update with no ArcGIS error details.";
      }

      var parts = [];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }

      return parts.join(": ");
    });

  if (errors.length === 0) {
    return "ArcGIS updateFeatures returned an unsuccessful update result for the measure-status layer, but no detailed error was provided.";
  }

  return "Measure-status update failed: " + errors.join(" | ");
}

function getAssignmentRuleForMeasure(measureId) {
  var normalizedId = normalizeMeasureId(measureId);
  return MEASURE_ASSIGNMENT_RULES[normalizedId] || null;
}

function getInitialAssignmentInfoForMeasure(measureId, rule, reachId, now) {
  var normalizedId = normalizeMeasureId(measureId);

  if (!rule) {
    return {
      assignment_group: "unclassified",
      assignment_target: "unclassified",
      geometry_type: "",
      assignment_mode: "manual_review",
      assignment_status: CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED,
      assigned_feature_id: null,
      assigned_layer: null,
      assigned_at: null
    };
  }

  var assignmentGroup = cleanRuleValue(rule.assignment_group) || "unclassified";
  var assignmentTarget = cleanRuleValue(rule.assignment_target) || "unclassified";
  var geometryType = cleanRuleValue(rule.geometry_type) || inferGeometryTypeFromRule(rule);
  var assignmentMode = cleanRuleValue(rule.assignment_mode).toLowerCase() || "manual_review";
  var autoAssign = isAutoAssignRule(rule);

  if (autoAssign) {
    return {
      assignment_group: assignmentGroup,
      assignment_target: assignmentTarget,
      geometry_type: geometryType,
      assignment_mode: assignmentMode,
      assignment_status: CONFIG.ASSIGNMENT_STATUS_ASSIGNED,
      assigned_feature_id: reachId,
      assigned_layer: CONFIG.ASSIGNED_LAYER_REACH,
      assigned_at: now
    };
  }

  return {
    assignment_group: assignmentGroup,
    assignment_target: assignmentTarget,
    geometry_type: geometryType,
    assignment_mode: assignmentMode,
    assignment_status: CONFIG.ASSIGNMENT_STATUS_PENDING,
    assigned_feature_id: null,
    assigned_layer: null,
    assigned_at: null
  };
}

function shouldUpdateReachStatusForMeasure(measureId) {
  var rule = getAssignmentRuleForMeasure(measureId);

  if (!rule) { return false; }
  if (!isAutoAssignRule(rule)) { return false; }

  return cleanRuleValue(rule.assignment_target).toLowerCase() === "reach";
}

function isAutoAssignRule(rule) {
  if (!rule) { return false; }

  var autoValue = rule.auto_assign_if_selected;
  var mode = cleanRuleValue(rule.assignment_mode).toLowerCase();

  return autoValue === 1 || autoValue === "1" || autoValue === true || mode === "automatic";
}

function filterMeasureIdsByImpoundmentRule(measureIds, isImpounded) {
  if (!CONFIG.USE_IMPOUNDMENT_FILTER) { return measureIds; }

  // If impoundment status is unknown, keep all measures rather than hiding possibly relevant options.
  if (isImpounded === null || isImpounded === undefined) { return measureIds; }

  return measureIds.filter(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule) { return true; }

    if (isImpoundmentOnlyRule(rule) && isImpounded === false) {
      return false;
    }

    return true;
  });
}

function isImpoundmentOnlyRule(rule) {
  return cleanRuleValue(rule.impoundment).toLowerCase() === "yes";
}

function getReachImpoundmentStatus(attributes) {
  var fromUrl = getImpoundmentStatusFromUrl();

  if (fromUrl !== null) { return fromUrl; }

  if (!attributes || !CONFIG.FIELD_REACH_IS_IMPOUNDED) { return null; }

  if (!Object.prototype.hasOwnProperty.call(attributes, CONFIG.FIELD_REACH_IS_IMPOUNDED)) {
    return null;
  }

  return parseImpoundmentValue(attributes[CONFIG.FIELD_REACH_IS_IMPOUNDED]);
}

function getImpoundmentStatusFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var value =
    params.get("is_impounded") ||
    params.get("impounded") ||
    params.get("Impounded") ||
    params.get("IMPOUNDED");

  if (value === null || value === undefined || value === "") { return null; }

  return parseImpoundmentValue(value);
}

function parseImpoundmentValue(value) {
  if (value === null || value === undefined) { return null; }

  var text = String(value).trim().toLowerCase();

  if (["1", "yes", "y", "true", "impounded"].indexOf(text) !== -1) {
    return true;
  }

  if (["0", "no", "n", "false", "not_impounded", "not impounded", "free_flowing", "free-flowing"].indexOf(text) !== -1) {
    return false;
  }

  return null;
}

function getImpoundmentDisplayText() {
  if (currentReachIsImpounded === true) {
    return " | Impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return " | Not impounded: impoundment-only measures hidden";
  }

  return " | Impoundment status unknown";
}

function getImpoundmentStatusTextForStatus() {
  if (currentReachIsImpounded === true) {
    return " for an impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return "; impoundment-only measures were hidden";
  }

  return "; impoundment status was not available";
}

function getPendingAssignmentSummaryText(measureIds) {
  var counts = {};

  measureIds.forEach(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule || isAutoAssignRule(rule)) { return; }

    var group = cleanRuleValue(rule.assignment_group) || "unclassified";
    counts[group] = (counts[group] || 0) + 1;
  });

  var groups = Object.keys(counts).sort();

  if (groups.length === 0) {
    return "";
  }

  var parts = groups.map(function(group) {
    return counts[group] + " " + group;
  });

  return " Pending assignment: " + parts.join(", ") + ".";
}

function cleanRuleValue(value) {
  if (value === null || value === undefined) { return ""; }
  return String(value).replace(/\u00a0/g, " ").trim();
}

function inferGeometryTypeFromRule(rule) {
  var target = cleanRuleValue(rule.assignment_target).toLowerCase();
  var group = cleanRuleValue(rule.assignment_group).toLowerCase();

  if (target === "reach") { return "line"; }
  if (target.indexOf("dam") !== -1 || target.indexOf("barrier") !== -1) { return "point"; }
  if (target.indexOf("location") !== -1) { return "point"; }
  if (target.indexOf("dike") !== -1 || target.indexOf("groyne") !== -1 || target.indexOf("side") !== -1 || target.indexOf("riverbank") !== -1) { return "line"; }
  if (group.indexOf("dam") !== -1 || group.indexOf("gravel") !== -1 || group.indexOf("feeding") !== -1 || group.indexOf("dredging") !== -1) { return "point"; }

  return "";
}

function setStatus(message, type) {
  var el = document.getElementById("status-message");

  el.textContent = message;
  el.className = "status-message";

  if (type) {
    el.classList.add(type);
  }
}

function clearStatus() {
  setStatus("", "");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeMeasureId(value) {
  // Normalises both internal measure IDs and ArcGIS field names to the same key.
  // Examples:
  //   D4A_001 -> D4A_001
  //   D4A_01  -> D4A_001
  //   D4A_1   -> D4A_001
  var raw = String(value).trim().toUpperCase();
  var match = raw.match(/^D4A_(\d{1,3})$/);

  if (!match) {
    return raw;
  }

  var numberPart = parseInt(match[1], 10);

  if (isNaN(numberPart)) {
    return raw;
  }

  return "D4A_" + String(numberPart).padStart(3, "0");
}

function escapeSqlLiteral(value) {
  return String(value).replaceAll("'", "''");
}
